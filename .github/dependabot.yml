version: 2
updates:

  # GitHub actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      github-actions:
        patterns:
          - "*"

  # golang.org and go.opentelemetry.io updates for all Go modules
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/internal/apmgodog"
      - "/internal/apmschema"
      - "/internal/tracecontexttest"
      - "/module/apmawssdkgo"
      - "/module/apmazure"
      - "/module/apmbeego"
      - "/module/apmchi"
      - "/module/apmchiv5"
      - "/module/apmecho"
      - "/module/apmechov4"
      - "/module/apmelasticsearch"
      - "/module/apmelasticsearch/internal/integration"
      - "/module/apmfasthttp"
      - "/module/apmfiber"
      - "/module/apmgin"
      - "/module/apmgocql"
      - "/module/apmgokit"
      - "/module/apmgometrics"
      - "/module/apmgopg"
      - "/module/apmgopgv10"
      - "/module/apmgoredis"
      - "/module/apmgoredisv8"
      - "/module/apmgorilla"
      - "/module/apmgorm"
      - "/module/apmgormv2"
      - "/module/apmgrpc"
      - "/module/apmhttp"
      - "/module/apmhttprouter"
      - "/module/apmlambda"
      - "/module/apmlogrus"
      - "/module/apmmongo"
      - "/module/apmnegroni"
      - "/module/apmot"
      - "/module/apmotel"
      - "/module/apmpgx"
      - "/module/apmpgxv5"
      - "/module/apmprometheus"
      - "/module/apmredigo"
      - "/module/apmrestful"
      - "/module/apmrestfulv3"
      - "/module/apmslog"
      - "/module/apmsql"
      - "/module/apmzap"
      - "/module/apmzerolog"
      - "/scripts/genmod"
      - "/tools"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    allow:
      - dependency-name: "golang.org/*"
      - dependency-name: "go.opentelemetry.io/*"
